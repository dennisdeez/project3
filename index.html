<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR Street View Walkthrough</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene xr-mode-ui="enabled: true">
      
      <a-assets>
        <img id="street-view" src="your-panorama.jpg">
        <img id="arrow-gif" src="your-arrow.gif">
        <video id="my-video" src="your-video.mp4" autoplay loop crossorigin="anonymous"></video>
      </a-assets>

      <a-sky src="#street-view" rotation="0 -90 0"></a-sky>

      <a-image src="#arrow-gif" position="0 0.1 -3" rotation="-90 0 0" width="1" height="1"></a-image>
      <a-image src="#arrow-gif" position="0 0.1 -6" rotation="-90 0 0" width="1" height="1"></a-image>
      <a-image src="#arrow-gif" position="2 0.1 -9" rotation="-90 0 0" width="1" height="1"></a-image>

      <a-video src="#my-video" position="3 1.5 -5" width="4" height="2.25"></a-video>

      <a-entity camera look-controls wasd-controls position="0 1.6 0"></a-entity>

    </a-scene>
  </body>
</html>
